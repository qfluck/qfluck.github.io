<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="个人工具与资源导航入口。" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <title>个人门户 | 工具与资源导航</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-strong: #115e59;
            --accent: #b45309;
            --bg: #f7faf9;
            --panel: #ffffff;
            --panel-muted: #eef6f4;
            --text: #10201d;
            --muted: #5f716d;
            --border: #dbe7e4;
            --shadow: 0 18px 45px rgba(13, 52, 46, 0.10);
            --radius: 8px;
        }

        * { box-sizing: border-box; }
        html { color-scheme: light; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                linear-gradient(140deg, rgba(15, 118, 110, 0.08), transparent 34%),
                linear-gradient(20deg, rgba(180, 83, 9, 0.08), transparent 32%),
                var(--bg);
            line-height: 1.6;
        }

        a { color: inherit; }
        .shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 40px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 34px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .mark {
            display: grid;
            place-items: center;
            width: 42px;
            height: 42px;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            font-weight: 800;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 3.2rem);
            line-height: 1.15;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            max-width: 680px;
        }

        .time-badge {
            white-space: nowrap;
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.7);
            color: var(--primary-strong);
            font-variant-numeric: tabular-nums;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin: 26px 0;
        }

        .search {
            width: min(520px, 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--panel);
            padding: 12px 14px;
            font-size: 1rem;
            outline: none;
        }

        .search:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            display: flex;
            flex-direction: column;
            min-height: 190px;
            padding: 20px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 8px 25px rgba(13, 52, 46, 0.06);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover, .card:focus-visible {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
            outline: none;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .icon {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            border-radius: var(--radius);
            background: var(--panel-muted);
            color: var(--primary);
        }

        .icon svg { width: 23px; height: 23px; }
        .tag {
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 1.16rem;
            line-height: 1.35;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .card .go {
            margin-top: auto;
            color: var(--primary-strong);
            font-weight: 700;
            padding-top: 18px;
        }

        .empty {
            display: none;
            margin: 22px 0;
            padding: 18px;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            color: var(--muted);
            background: rgba(255, 255, 255, 0.55);
        }

        footer {
            margin-top: 42px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .shell { width: min(100% - 24px, 1120px); padding-top: 20px; }
            .topbar { align-items: flex-start; flex-direction: column; }
            .time-badge { width: 100%; }
            .toolbar { margin: 20px 0; }
            .card { min-height: 170px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div class="topbar">
                <div class="brand">
                    <div class="mark" aria-hidden="true">Q</div>
                    <div>
                        <h1 id="greeting">个人门户</h1>
                        <p class="subtitle">集中访问常用工具、收藏资源和阅读资料。</p>
                    </div>
                </div>
                <time class="time-badge" id="datetime">正在加载时间...</time>
            </div>
            <div class="toolbar">
                <input class="search" id="searchInput" type="search" placeholder="搜索工具或资源..." autocomplete="off" />
            </div>
        </header>

        <main>
            <div id="cardContainer" class="grid" aria-live="polite"></div>
            <div id="emptyState" class="empty">没有找到匹配的入口。</div>
        </main>

        <footer>
            &copy; <span id="currentYear"></span> 个人门户
        </footer>
    </div>

    <script>
        const cards = [
            {
                href: "/encrypt.html",
                title: "对称加密工具",
                tag: "工具",
                description: "在浏览器本地完成文本加密、解密、复制和快速清空。",
                keywords: "encrypt crypto aes des 加密 解密",
                icon: "lock"
            },
            {
                href: "/VO.html",
                title: "JSON 实体类生成器",
                tag: "开发",
                description: "将 JSON 样例转换为 TypeScript、Java、Python 或 C# 数据结构。",
                keywords: "json entity class typescript java python csharp vo",
                icon: "code"
            },
            {
                href: "/book-market.html",
                title: "灵动收藏",
                tag: "资源",
                description: "通过远端 API 管理个人收藏，支持搜索、主题切换和在线编辑。",
                keywords: "bookmark collection 收藏 资源",
                icon: "bookmark"
            },
            {
                href: "/book.html",
                title: "投资书籍",
                tag: "阅读",
                description: "浏览和打开本地收录的投资、商业与经济类 PDF。",
                keywords: "books pdf reading 投资 书籍",
                icon: "book"
            },
            // {
            //     href: "/jiachao.txt",
            //     title: "订阅文本",
            //     tag: "文本",
            //     description: "查看站点提供的订阅文本资源。",
            //     keywords: "txt subscribe 订阅 文本",
            //     icon: "file"
            // },
            {
                href: "/sudoku.html",
                title: "数独游戏",
                tag: "游戏",
                description: "在线数独游戏，支持多种难度级别和自动检查功能。",
                keywords: "sudoku game puzzle 数独 游戏 益智",
                icon: "game"
            }
        ];

        const iconPaths = {
            lock: "M7 10V7a5 5 0 0 1 10 0v3m-9 0h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2Z",
            code: "m9 18-6-6 6-6m6 0 6 6-6 6",
            bookmark: "M6 4h12v17l-6-4-6 4V4Z",
            book: "M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H6.5A2.5 2.5 0 0 0 4 21.5v-16Zm0 0v16",
            file: "M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6Zm0 0v6h6",
            game: "M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8Zm-2-8h4v2h-4Zm0-4h4v2h-4Z"
        };

        const cardContainer = document.getElementById("cardContainer");
        const emptyState = document.getElementById("emptyState");
        const searchInput = document.getElementById("searchInput");

        function renderCards() {
            const term = searchInput.value.trim().toLowerCase();
            const filtered = cards.filter(card => {
                const haystack = `${card.title} ${card.description} ${card.keywords}`.toLowerCase();
                return haystack.includes(term);
            });

            cardContainer.innerHTML = filtered.map(card => `
                <a class="card" href="${card.href}">
                    <div class="card-top">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="${iconPaths[card.icon]}"></path>
                            </svg>
                        </span>
                        <span class="tag">${card.tag}</span>
                    </div>
                    <h2>${card.title}</h2>
                    <p>${card.description}</p>
                    <span class="go">打开</span>
                </a>
            `).join("");

            emptyState.style.display = filtered.length ? "none" : "block";
        }

        function updateTime() {
            const now = new Date();
            const hour = now.getHours();
            const greeting = hour < 5 ? "夜深了" : hour < 11 ? "早上好" : hour < 13 ? "中午好" : hour < 18 ? "下午好" : "晚上好";

            document.getElementById("greeting").textContent = `${greeting}，这里是个人门户`;
            document.getElementById("datetime").textContent = now.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                weekday: "long",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false
            });
            document.getElementById("currentYear").textContent = now.getFullYear();
        }

        searchInput.addEventListener("input", renderCards);
        renderCards();
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
