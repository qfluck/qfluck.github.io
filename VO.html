<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="将 JSON 样例转换为常用语言实体类。" />
    <title>JSON 实体类生成器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-strong: #0284c7;
            --success: #15803d;
            --danger: #b91c1c;
            --bg: #101820;
            --panel: #17212b;
            --panel-2: #0f1720;
            --text: #f8fafc;
            --muted: #a8b3c1;
            --border: #2a3948;
            --radius: 8px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
        }

        a { color: inherit; }

        .app {
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 32, 0.92);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .home {
            color: var(--primary);
            text-decoration: none;
            font-weight: 750;
            white-space: nowrap;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.35rem, 3vw, 2rem);
            letter-spacing: 0;
            white-space: nowrap;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        input, select, textarea {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--panel-2);
            color: var(--text);
            font: inherit;
            outline: none;
        }

        input, select {
            min-height: 40px;
            padding: 0 12px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.16);
        }

        .btn {
            min-height: 40px;
            border: 0;
            border-radius: var(--radius);
            padding: 0 14px;
            background: var(--primary);
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        .btn.secondary { background: #334155; }
        .btn.success { background: var(--success); }
        .btn:hover { filter: brightness(1.05); }

        main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 14px;
            padding: 14px;
            min-height: 0;
        }

        .pane {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 96px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--panel);
            overflow: hidden;
        }

        .pane-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }

        .pane-head h2 {
            margin: 0;
            font-size: 1rem;
        }

        .meta {
            color: var(--muted);
            font-size: 0.88rem;
        }

        textarea, pre {
            flex: 1;
            min-height: 0;
            margin: 0;
            padding: 16px;
            overflow: auto;
            border: 0;
            border-radius: 0;
            background: var(--panel-2);
            color: var(--text);
            resize: none;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 0.92rem;
            line-height: 1.58;
        }

        code { min-height: 100%; }

        .message {
            position: fixed;
            right: 18px;
            bottom: 18px;
            max-width: min(460px, calc(100% - 36px));
            padding: 12px 16px;
            border-radius: var(--radius);
            background: var(--danger);
            color: white;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message.ok { background: var(--success); }

        @media (max-width: 920px) {
            header { grid-template-columns: 1fr; }
            .controls { justify-content: flex-start; }
            main { grid-template-columns: 1fr; }
            .pane { min-height: 420px; }
        }

        @media (max-width: 620px) {
            header { padding: 14px; }
            .title { align-items: flex-start; flex-direction: column; gap: 6px; }
            h1 { white-space: normal; }
            .controls > * { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="title">
                <a class="home" href="/">返回首页</a>
                <h1>JSON 实体类生成器</h1>
            </div>
            <div class="controls">
                <input id="rootName" type="text" value="RootEntity" aria-label="根类型名称" />
                <select id="languageSelector" aria-label="目标语言">
                    <option value="ts">TypeScript</option>
                    <option value="java">Java</option>
                    <option value="python">Python</option>
                    <option value="csharp">C#</option>
                </select>
                <button id="sampleButton" class="btn secondary" type="button">示例</button>
                <button id="formatButton" class="btn secondary" type="button">格式化</button>
                <button id="generateButton" class="btn" type="button">生成</button>
            </div>
        </header>

        <main>
            <section class="pane">
                <div class="pane-head">
                    <h2>输入 JSON</h2>
                    <span class="meta" id="inputMeta">0 字符</span>
                </div>
                <textarea id="jsonInput" spellcheck="false" placeholder='粘贴 JSON，例如：{"user_id": 1, "user_name": "Test"}'></textarea>
            </section>

            <section class="pane">
                <div class="pane-head">
                    <h2>生成代码</h2>
                    <button id="copyButton" class="btn success" type="button">复制</button>
                </div>
                <pre><code id="codeOutput" class="language-typescript"></code></pre>
            </section>
        </main>
    </div>

    <div id="messagePopup" class="message" role="status" aria-live="polite"></div>

    <script>
        const jsonInput = document.getElementById("jsonInput");
        const codeOutput = document.getElementById("codeOutput");
        const generateButton = document.getElementById("generateButton");
        const languageSelector = document.getElementById("languageSelector");
        const copyButton = document.getElementById("copyButton");
        const messagePopup = document.getElementById("messagePopup");
        const rootNameInput = document.getElementById("rootName");
        const inputMeta = document.getElementById("inputMeta");

        const sampleJson = {
            user_id: 1,
            user_name: "Alice",
            enabled: true,
            profile: {
                email: "alice@example.com",
                tags: ["investor", "reader"]
            },
            orders: [
                { order_id: "A1001", amount: 120.5, paid: false }
            ]
        };

        const reservedWords = {
            ts: new Set(["class", "interface", "type", "default", "function", "return"]),
            java: new Set(["class", "public", "private", "void", "new", "return"]),
            python: new Set(["class", "def", "return", "from", "import", "pass"]),
            csharp: new Set(["class", "public", "private", "namespace", "return", "new"])
        };

        function showMessage(text, type = "error", duration = 2600) {
            messagePopup.textContent = text;
            messagePopup.className = `message show ${type === "ok" ? "ok" : ""}`;
            window.clearTimeout(showMessage.timer);
            showMessage.timer = window.setTimeout(() => {
                messagePopup.className = "message";
            }, duration);
        }

        function toWords(str) {
            return String(str)
                .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
                .replace(/[^A-Za-z0-9]+/g, " ")
                .trim()
                .split(/\s+/)
                .filter(Boolean);
        }

        function toPascalCase(str) {
            const words = toWords(str);
            const name = words.map(word => word.charAt(0).toUpperCase() + word.slice(1)).join("");
            return /^\d/.test(name) ? `Entity${name}` : (name || "Entity");
        }

        function toCamelCase(str) {
            const pascal = toPascalCase(str);
            return pascal.charAt(0).toLowerCase() + pascal.slice(1);
        }

        function toSnakeCase(str) {
            return toWords(str).map(word => word.toLowerCase()).join("_") || "field";
        }

        function safeFieldName(key, lang) {
            const raw = lang === "python" ? toSnakeCase(key) : lang === "csharp" ? toPascalCase(key) : toCamelCase(key);
            const fallback = lang === "csharp" ? "Field" : "field";
            const normalized = raw || fallback;
            const safe = /^\d/.test(normalized) ? `${fallback}${normalized}` : normalized;
            return reservedWords[lang].has(safe) ? `${safe}_value` : safe;
        }

        function getValueKind(value) {
            if (value === null) return "null";
            if (Array.isArray(value)) return "array";
            return typeof value;
        }

        function inferPrimitive(value, lang) {
            if (value === null) return lang === "java" ? "Object" : lang === "python" ? "Any" : lang === "csharp" ? "object" : "any";
            if (typeof value === "number") {
                return {
                    ts: "number",
                    java: Number.isInteger(value) ? "Integer" : "Double",
                    python: Number.isInteger(value) ? "int" : "float",
                    csharp: Number.isInteger(value) ? "int" : "double"
                }[lang];
            }
            if (typeof value === "boolean") {
                return { ts: "boolean", java: "Boolean", python: "bool", csharp: "bool" }[lang];
            }
            return "string";
        }

        function arrayType(itemType, lang) {
            if (lang === "ts") return `${itemType}[]`;
            if (lang === "python") return `List[${itemType}]`;
            return `List<${itemType}>`;
        }

        function generateClasses(jsonObj, rootClassName, lang) {
            const classes = new Map();

            function inferType(value, key) {
                const kind = getValueKind(value);
                if (kind === "array") {
                    if (!value.length) return arrayType(lang === "java" ? "Object" : lang === "python" ? "Any" : lang === "csharp" ? "object" : "any", lang);
                    const firstObject = value.find(item => item && typeof item === "object" && !Array.isArray(item));
                    if (firstObject) {
                        const singular = String(key).endsWith("s") ? String(key).slice(0, -1) : key;
                        const nestedName = toPascalCase(singular);
                        buildClass(nestedName, firstObject);
                        return arrayType(nestedName, lang);
                    }
                    const primitiveTypes = [...new Set(value.map(item => inferPrimitive(item, lang)))];
                    return arrayType(primitiveTypes[0] || "any", lang);
                }
                if (kind === "object") {
                    const nestedName = toPascalCase(key);
                    buildClass(nestedName, value);
                    return nestedName;
                }
                return inferPrimitive(value, lang);
            }

            function buildClass(name, obj) {
                if (!obj || typeof obj !== "object" || Array.isArray(obj)) return;
                const className = toPascalCase(name);
                if (classes.has(className)) return;

                const fields = Object.keys(obj).map(key => ({
                    original: key,
                    name: safeFieldName(key, lang),
                    type: inferType(obj[key], key)
                }));

                classes.set(className, renderClass(className, fields));
            }

            function renderClass(className, fields) {
                if (lang === "ts") {
                    return `export interface ${className} {\n${fields.map(field => `  ${field.name}: ${field.type};`).join("\n")}\n}`;
                }
                if (lang === "java") {
                    return `public class ${className} {\n${fields.map(field => `    private ${field.type} ${field.name};`).join("\n")}\n}`;
                }
                if (lang === "python") {
                    const body = fields.length ? fields.map(field => `    ${field.name}: ${field.type}`).join("\n") : "    pass";
                    return `@dataclass\nclass ${className}:\n${body}`;
                }
                return `public class ${className}\n{\n${fields.map(field => `    [JsonPropertyName("${field.original}")]\n    public ${field.type} ${field.name} { get; set; }`).join("\n\n")}\n}`;
            }

            buildClass(rootClassName, jsonObj);

            const imports = {
                ts: "",
                java: "import java.util.List;\n\n",
                python: "from dataclasses import dataclass\nfrom typing import Any, List\n\n",
                csharp: "using System.Collections.Generic;\nusing System.Text.Json.Serialization;\n\n"
            };

            return imports[lang] + [...classes.values()].reverse().join("\n\n");
        }

        function parseJsonInput() {
            const jsonStr = jsonInput.value.trim();
            if (!jsonStr) throw new Error("JSON 输入不能为空。");

            const parsed = JSON.parse(jsonStr);
            const dataObject = Array.isArray(parsed) ? parsed[0] : parsed;
            if (!dataObject || typeof dataObject !== "object" || Array.isArray(dataObject)) {
                throw new Error("JSON 根内容需要是对象，或至少包含一个对象的数组。");
            }
            return dataObject;
        }

        function highlight(lang) {
            codeOutput.removeAttribute("data-highlighted");
            const classMap = { ts: "typescript", java: "java", python: "python", csharp: "csharp" };
            codeOutput.className = `language-${classMap[lang]}`;
            if (window.hljs) hljs.highlightElement(codeOutput);
        }

        function handleGenerate() {
            try {
                const dataObject = parseJsonInput();
                const selectedLang = languageSelector.value;
                const rootClassName = rootNameInput.value.trim() || "RootEntity";
                codeOutput.textContent = generateClasses(dataObject, rootClassName, selectedLang);
                highlight(selectedLang);
                showMessage("代码已生成。", "ok", 1800);
            } catch (error) {
                showMessage(error.message || "无法生成代码，请检查 JSON 格式。");
            }
        }

        function updateInputMeta() {
            inputMeta.textContent = `${jsonInput.value.length} 字符`;
        }

        generateButton.addEventListener("click", handleGenerate);
        document.getElementById("sampleButton").addEventListener("click", () => {
            jsonInput.value = JSON.stringify(sampleJson, null, 2);
            updateInputMeta();
            handleGenerate();
        });
        document.getElementById("formatButton").addEventListener("click", () => {
            try {
                jsonInput.value = JSON.stringify(JSON.parse(jsonInput.value), null, 2);
                updateInputMeta();
                showMessage("JSON 已格式化。", "ok", 1800);
            } catch (error) {
                showMessage("JSON 格式无效，无法格式化。");
            }
        });
        copyButton.addEventListener("click", async () => {
            if (!codeOutput.textContent.trim()) {
                showMessage("没有可复制的代码。");
                return;
            }
            try {
                await navigator.clipboard.writeText(codeOutput.textContent);
                showMessage("代码已复制。", "ok", 1800);
            } catch (error) {
                showMessage("复制失败，请手动选择代码复制。");
            }
        });
        languageSelector.addEventListener("change", () => {
            if (jsonInput.value.trim()) handleGenerate();
            else highlight(languageSelector.value);
        });
        rootNameInput.addEventListener("change", () => {
            if (jsonInput.value.trim()) handleGenerate();
        });
        jsonInput.addEventListener("input", updateInputMeta);
        jsonInput.addEventListener("keydown", event => {
            if (event.ctrlKey && event.key === "Enter") handleGenerate();
        });
        updateInputMeta();
    </script>
</body>
</html>
