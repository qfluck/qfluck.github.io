<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="个人收藏资源管理页面。" />
    <title>灵动收藏 | 个人资源中心</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-strong: #115e59;
            --accent: #b45309;
            --danger: #b91c1c;
            --bg: #f7faf9;
            --panel: #ffffff;
            --panel-soft: #eef6f4;
            --header: rgba(255, 255, 255, 0.92);
            --text: #10201d;
            --muted: #63736f;
            --border: #dbe7e4;
            --shadow: 0 16px 38px rgba(13, 52, 46, 0.10);
            --radius: 8px;
        }

        [data-theme="dark"] {
            --primary: #2dd4bf;
            --primary-strong: #5eead4;
            --accent: #fbbf24;
            --danger: #f87171;
            --bg: #0f1720;
            --panel: #17212b;
            --panel-soft: #10201d;
            --header: rgba(15, 23, 32, 0.92);
            --text: #f8fafc;
            --muted: #a8b3c1;
            --border: #2a3948;
            --shadow: 0 16px 38px rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
        }

        a { color: inherit; }

        .auth {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(15, 23, 32, 0.62);
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .auth-card, .modal-card {
            width: min(460px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        .auth-card h1, .modal-card h2 {
            margin: 0 0 8px;
            font-size: 1.55rem;
            letter-spacing: 0;
        }

        .auth-card p {
            margin: 0 0 20px;
            color: var(--muted);
        }

        .app[hidden], .auth[hidden], .modal[hidden] { display: none; }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--header);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(14px);
        }

        .header-inner {
            width: min(1280px, calc(100% - 32px));
            margin: 0 auto;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 14px;
            align-items: center;
            padding: 14px 0;
        }

        .home {
            color: var(--primary);
            text-decoration: none;
            font-weight: 800;
            white-space: nowrap;
        }

        .logo {
            min-width: 0;
            font-size: 1.35rem;
            font-weight: 850;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            align-items: center;
        }

        input, textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--panel);
            color: var(--text);
            font: inherit;
            padding: 12px 13px;
            outline: none;
        }

        textarea { resize: vertical; min-height: 100px; }
        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        .search {
            max-width: 360px;
            background: var(--panel-soft);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0 14px;
            background: var(--panel);
            color: var(--text);
            cursor: pointer;
            font-weight: 800;
            white-space: nowrap;
        }

        .btn.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: var(--bg);
        }

        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn.icon {
            width: 42px;
            padding: 0;
            font-size: 1.1rem;
        }

        .btn:hover { filter: brightness(0.97); }

        .main {
            width: min(1280px, calc(100% - 32px));
            margin: 0 auto;
            padding: 22px 0 44px;
        }

        .statusbar {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            margin-bottom: 18px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 185px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--panel);
            box-shadow: 0 8px 24px rgba(13, 52, 46, 0.05);
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .card-main {
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 13px;
            min-width: 0;
            text-decoration: none;
        }

        .favicon-box {
            display: grid;
            place-items: center;
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--panel-soft);
            color: var(--primary);
            font-weight: 850;
        }

        .favicon {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .card h2 {
            margin: 0 0 5px;
            font-size: 1.08rem;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            overflow-wrap: anywhere;
        }

        .url {
            margin-top: 8px;
            color: var(--primary-strong);
            font-size: 0.86rem;
            overflow-wrap: anywhere;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: auto;
        }

        .empty, .loading {
            padding: 24px;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            background: var(--panel);
            color: var(--muted);
        }

        .modal {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(15, 23, 32, 0.62);
            backdrop-filter: blur(10px);
            z-index: 30;
        }

        .form-grid {
            display: grid;
            gap: 14px;
            margin-top: 18px;
        }

        label {
            display: grid;
            gap: 7px;
            font-weight: 780;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 6px;
        }

        #toast {
            position: fixed;
            left: 50%;
            bottom: 22px;
            max-width: min(560px, calc(100% - 32px));
            transform: translateX(-50%) translateY(12px);
            opacity: 0;
            pointer-events: none;
            padding: 12px 18px;
            border-radius: var(--radius);
            background: #10201d;
            color: white;
            box-shadow: var(--shadow);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 40;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.error { background: var(--danger); }

        @media (max-width: 780px) {
            .header-inner { grid-template-columns: 1fr; }
            .controls { justify-content: flex-start; flex-wrap: wrap; }
            .search { max-width: none; }
            .statusbar { align-items: flex-start; flex-direction: column; }
        }

        @media (max-width: 520px) {
            .header-inner, .main { width: min(100% - 24px, 1280px); }
            .controls > * { flex: 1 1 100%; }
            .btn.icon { flex-basis: 42px; }
            .form-actions { flex-direction: column-reverse; }
        }
    </style>
</head>
<body data-theme="light">
    <section id="apiKeyModal" class="auth">
        <form class="auth-card" id="apiKeyForm">
            <h1>身份验证</h1>
            <p>输入管理密钥后加载个人收藏。密钥仅保存在当前浏览器。</p>
            <label>
                管理密钥
                <input type="password" id="apiKeyInput" placeholder="请输入密钥" autocomplete="current-password" required />
            </label>
            <button class="btn primary" type="submit" style="width: 100%; margin-top: 16px;">进入收藏</button>
        </form>
    </section>

    <div id="appWrapper" class="app" hidden>
        <header>
            <div class="header-inner">
                <a class="home" href="/">返回首页</a>
                <div class="logo">灵动收藏</div>
                <div class="controls">
                    <input class="search" type="search" id="searchInput" placeholder="搜索标题、描述或网址..." autocomplete="off" />
                    <button class="btn icon" id="themeToggle" type="button" title="切换主题" aria-label="切换主题">◐</button>
                    <button class="btn" id="refreshButton" type="button">刷新</button>
                    <button class="btn primary" id="addBtn" type="button">新增收藏</button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="statusbar">
                <div id="resultInfo">准备加载收藏...</div>
                <button class="btn danger" id="logoutButton" type="button">清除密钥</button>
            </div>
            <div id="loadingState" class="loading">正在加载收藏...</div>
            <div id="bookmarksGrid" class="grid" aria-live="polite"></div>
            <div id="emptyState" class="empty" hidden>暂无匹配的收藏。</div>
        </main>
    </div>

    <section id="bookmarkModal" class="modal" hidden>
        <form class="modal-card" id="bookmarkForm">
            <h2 id="modalTitle">新增收藏</h2>
            <div class="form-grid">
                <input type="hidden" id="editId" />
                <label>
                    标题
                    <input type="text" id="title" required placeholder="例如：GitHub 开源社区" />
                </label>
                <label>
                    网址
                    <input type="url" id="url" required placeholder="https://example.com" />
                </label>
                <label>
                    简介
                    <textarea id="description" placeholder="添加备注或详细描述"></textarea>
                </label>
                <div class="form-actions">
                    <button type="button" class="btn" id="cancelButton">取消</button>
                    <button type="submit" class="btn primary">保存</button>
                </div>
            </div>
        </form>
    </section>

    <div id="toast" role="status" aria-live="polite"></div>

    <script>
        const API_URL = "https://api.4416123.xyz/api/bookmark";
        const $ = id => document.getElementById(id);
        let apiKey = "";
        let bookmarks = [];
        let lastDeleted = null;

        function setTheme(theme) {
            document.body.dataset.theme = theme;
            localStorage.setItem("bookmark_theme", theme);
        }

        function showToast(message, type = "info") {
            const toast = $("toast");
            toast.textContent = message;
            toast.className = `show ${type}`;
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => {
                toast.className = "";
            }, 2600);
        }

        function escapeHtml(value = "") {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function normalizeUrl(value) {
            const raw = String(value || "").trim();
            if (!raw) return "";
            try {
                return new URL(raw).toString();
            } catch (error) {
                try {
                    return new URL(`https://${raw}`).toString();
                } catch (nestedError) {
                    return "";
                }
            }
        }

        function hostname(value) {
            try {
                return new URL(value).hostname;
            } catch (error) {
                return "link";
            }
        }

        async function fetchBookmarks() {
            $("loadingState").hidden = false;
            $("bookmarksGrid").innerHTML = "";
            $("emptyState").hidden = true;
            $("resultInfo").textContent = "正在加载收藏...";

            const response = await fetch(API_URL, { headers: { "x-api-key": apiKey } });
            if (!response.ok) throw new Error("密钥无效或服务暂时不可用。");
            const data = await response.json();
            bookmarks = Array.isArray(data) ? data : [];
            localStorage.setItem("bookmark_key", apiKey);
            render();
        }

        async function initApp(key) {
            apiKey = key.trim();
            if (!apiKey) {
                showToast("请输入密钥。", "error");
                return;
            }
            try {
                await fetchBookmarks();
                $("apiKeyModal").hidden = true;
                $("appWrapper").hidden = false;
                $("searchInput").focus();
            } catch (error) {
                showToast(error.message || "加载失败，请稍后重试。", "error");
            } finally {
                $("loadingState").hidden = true;
            }
        }

        function render() {
            const term = $("searchInput").value.trim().toLowerCase();
            const filtered = bookmarks.filter(bookmark => {
                const haystack = `${bookmark.title || ""} ${bookmark.description || ""} ${bookmark.url || ""}`.toLowerCase();
                return haystack.includes(term);
            });

            $("bookmarksGrid").innerHTML = filtered.map(bookmark => {
                const safeUrl = normalizeUrl(bookmark.url);
                const host = hostname(safeUrl);
                const favicon = safeUrl ? `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(host)}` : "";
                return `
                    <article class="card">
                        <a class="card-main" href="${escapeHtml(safeUrl || "#")}" target="_blank" rel="noopener">
                            <span class="favicon-box" aria-hidden="true">
                                ${favicon ? `<img class="favicon" src="${favicon}" alt="" loading="lazy" />` : "URL"}
                            </span>
                            <span>
                                <h2>${escapeHtml(bookmark.title || "未命名收藏")}</h2>
                                <p>${escapeHtml(bookmark.description || "暂无简介")}</p>
                                <span class="url">${escapeHtml(host)}</span>
                            </span>
                        </a>
                        <div class="card-actions">
                            <button class="btn" type="button" data-edit="${bookmark.id}">编辑</button>
                            <button class="btn danger" type="button" data-delete="${bookmark.id}">删除</button>
                        </div>
                    </article>
                `;
            }).join("");

            $("loadingState").hidden = true;
            $("emptyState").hidden = filtered.length > 0;
            $("resultInfo").textContent = `显示 ${filtered.length} / ${bookmarks.length} 条收藏`;
        }

        async function sync(message = "数据已同步。") {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json", "x-api-key": apiKey },
                body: JSON.stringify(bookmarks)
            });
            if (!response.ok) throw new Error("同步失败，请检查网络或密钥。");
            showToast(message);
        }

        function openModal(mode, bookmark = null) {
            $("modalTitle").textContent = mode === "edit" ? "编辑收藏" : "新增收藏";
            $("editId").value = bookmark ? bookmark.id : "";
            $("title").value = bookmark ? bookmark.title || "" : "";
            $("url").value = bookmark ? bookmark.url || "" : "";
            $("description").value = bookmark ? bookmark.description || "" : "";
            $("bookmarkModal").hidden = false;
            $("title").focus();
        }

        function closeModal() {
            $("bookmarkModal").hidden = true;
            $("bookmarkForm").reset();
            $("editId").value = "";
        }

        async function deleteBookmark(id) {
            const target = bookmarks.find(item => String(item.id) === String(id));
            if (!target) return;
            if (!confirm(`确定删除「${target.title || "未命名收藏"}」吗？`)) return;

            lastDeleted = target;
            bookmarks = bookmarks.filter(item => String(item.id) !== String(id));
            render();
            try {
                await sync("收藏已删除。");
            } catch (error) {
                bookmarks.unshift(lastDeleted);
                render();
                showToast(error.message, "error");
            }
        }

        $("apiKeyForm").addEventListener("submit", event => {
            event.preventDefault();
            initApp($("apiKeyInput").value);
        });
        $("themeToggle").addEventListener("click", () => {
            setTheme(document.body.dataset.theme === "dark" ? "light" : "dark");
        });
        $("refreshButton").addEventListener("click", async () => {
            try {
                await fetchBookmarks();
                showToast("收藏已刷新。");
            } catch (error) {
                showToast(error.message, "error");
            }
        });
        $("addBtn").addEventListener("click", () => openModal("add"));
        $("cancelButton").addEventListener("click", closeModal);
        $("bookmarkModal").addEventListener("click", event => {
            if (event.target === $("bookmarkModal")) closeModal();
        });
        $("bookmarksGrid").addEventListener("click", event => {
            const editButton = event.target.closest("[data-edit]");
            const deleteButton = event.target.closest("[data-delete]");
            if (editButton) {
                const bookmark = bookmarks.find(item => String(item.id) === String(editButton.dataset.edit));
                if (bookmark) openModal("edit", bookmark);
            }
            if (deleteButton) deleteBookmark(deleteButton.dataset.delete);
        });
        $("bookmarkForm").addEventListener("submit", async event => {
            event.preventDefault();
            const safeUrl = normalizeUrl($("url").value);
            if (!safeUrl) {
                showToast("请输入有效网址。", "error");
                $("url").focus();
                return;
            }

            const id = $("editId").value;
            const data = {
                id: id ? Number(id) : Date.now(),
                title: $("title").value.trim(),
                url: safeUrl,
                description: $("description").value.trim()
            };

            const previous = bookmarks.slice();
            bookmarks = id ? bookmarks.map(item => String(item.id) === String(id) ? data : item) : [data, ...bookmarks];
            closeModal();
            render();

            try {
                await sync(id ? "收藏已更新。" : "收藏已新增。");
            } catch (error) {
                bookmarks = previous;
                render();
                showToast(error.message, "error");
            }
        });
        $("searchInput").addEventListener("input", render);
        $("logoutButton").addEventListener("click", () => {
            localStorage.removeItem("bookmark_key");
            apiKey = "";
            bookmarks = [];
            $("appWrapper").hidden = true;
            $("apiKeyModal").hidden = false;
            $("apiKeyInput").value = "";
            $("apiKeyInput").focus();
        });

        setTheme(localStorage.getItem("bookmark_theme") || "light");
        const savedKey = localStorage.getItem("bookmark_key");
        if (savedKey) {
            $("apiKeyInput").value = savedKey;
            initApp(savedKey);
        }
    </script>
</body>
</html>
