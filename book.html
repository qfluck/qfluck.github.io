<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>book</title>
<style>
    /* 1. 基础重置与背景 */
    body {
        font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        margin: 0;
    }

    /* 2. 标题样式 */
    h1 {
        font-weight: 300;
        letter-spacing: 2px;
        color: #2c3e50;
        margin-bottom: 40px;
        border-bottom: 2px solid #3498db;
        padding-bottom: 10px;
    }

    /* 3. 列表容器 */
    ul {
        list-style: none;
        padding: 0;
        width: 100%;
        max-width: 600px;
    }

    /* 4. 书籍条目卡片化 */
    li {
        background: #fff;
        margin-bottom: 15px;
        border-radius: 8px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    li:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    /* 5. 链接样式 */
    a {
        display: block;
        padding: 18px 25px;
        text-decoration: none;
        color: #444;
        font-size: 1.1rem;
        font-weight: 500;
        display: flex;
        align-items: center;
    }

    /* 添加一个小图标装饰 */
    a::before {
        content: '📖';
        margin-right: 15px;
        font-size: 1.2rem;
        filter: grayscale(100%);
        transition: filter 0.3s;
    }

    li:hover a::before {
        filter: grayscale(0%);
    }

    li:hover a {
        color: #3498db;
    }

    /* 6. 响应式调整 */
    @media (max-width: 480px) {
        h1 { font-size: 1.5rem; }
        a { font-size: 1rem; padding: 15px; }
    }
</style>
</head>
<body>
    <h1>Books</h1>
    <ul>
        <li>
            <a href="/books/中国历代政治得失.pdf">中国历代政治得失</a>
        </li>
        <li>
            <a href="/books/国富论 ([英]亚当.斯密著，王亚南译) (Z-Library).pdf">国富论</a>
        </li>
        <li>
            <a href="/books/巴菲特传：一个美国资本家的成长 (Roger Lowenstein) (Z-Library).pdf">巴菲特传：一个美国资本家的成长</a>
        </li>
        <li>
             <a href="/books/段永平投资问答录(商业逻辑篇).pdf">段永平投资问答录(商业逻辑篇)</a>
        </li>
        <li>
            <a href="/books/段永平投资问答录(投资逻辑篇).pdf">段永平投资问答录(投资逻辑篇)</a>
        </li>
        <li>
            <a href="/books/段永平-Stop Doing List.pdf">段永平-Stop Doing List</a>
        </li>
    </ul>
    
</body>
</html>
