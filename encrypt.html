<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="浏览器本地对称加密与解密工具。" />
    <title>对称加密工具 | 本地处理</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.js"></script>
    <style>
        :root {
            --primary: #0f766e;
            --primary-strong: #115e59;
            --success: #15803d;
            --danger: #b91c1c;
            --warning: #b45309;
            --bg: #f7faf9;
            --panel: #ffffff;
            --text: #10201d;
            --muted: #63736f;
            --border: #dbe7e4;
            --radius: 8px;
            --shadow: 0 16px 42px rgba(13, 52, 46, 0.10);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                linear-gradient(135deg, rgba(15, 118, 110, 0.10), transparent 34%),
                var(--bg);
            color: var(--text);
            line-height: 1.55;
        }

        .shell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 44px;
        }

        .nav {
            display: inline-flex;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .panel {
            overflow: hidden;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        header {
            padding: 28px;
            background: #10201d;
            color: white;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 2.6rem);
            letter-spacing: 0;
            line-height: 1.15;
        }

        header p {
            margin: 10px 0 0;
            color: #c7d7d3;
        }

        .content { padding: 26px; }

        .settings {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) 180px auto;
            gap: 14px;
            align-items: end;
            margin-bottom: 22px;
        }

        .field { display: grid; gap: 8px; }
        label { font-weight: 750; color: #36524d; }

        input, select, textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: white;
            color: var(--text);
            padding: 12px 13px;
            font: inherit;
            outline: none;
        }

        textarea {
            min-height: 260px;
            resize: vertical;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 0.94rem;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        .key-row {
            position: relative;
        }

        .key-row input {
            padding-right: 88px;
        }

        .ghost-btn {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: white;
            color: var(--text);
            min-height: 44px;
            padding: 0 14px;
            cursor: pointer;
            font-weight: 750;
        }

        .key-toggle {
            position: absolute;
            right: 6px;
            top: 6px;
            min-height: 32px;
            padding: 0 10px;
            color: var(--primary);
        }

        .hint {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .workbench {
            display: grid;
            grid-template-columns: 1fr 72px 1fr;
            gap: 16px;
            align-items: stretch;
        }

        .box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .box-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .copy-btn {
            border: 0;
            color: var(--primary);
            background: transparent;
            cursor: pointer;
            font-weight: 750;
        }

        .actions {
            display: grid;
            gap: 10px;
            align-content: center;
        }

        .btn {
            min-height: 44px;
            border: 0;
            border-radius: var(--radius);
            color: white;
            cursor: pointer;
            font-weight: 800;
            padding: 0 14px;
            box-shadow: 0 8px 18px rgba(13, 52, 46, 0.12);
        }

        .btn.encrypt { background: var(--primary); }
        .btn.decrypt { background: var(--success); }
        .btn.clear { background: #475569; }
        .btn:hover, .ghost-btn:hover, .copy-btn:hover { filter: brightness(0.96); }
        .btn:active, .ghost-btn:active { transform: translateY(1px); }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        #toast {
            position: fixed;
            left: 50%;
            bottom: 26px;
            max-width: min(520px, calc(100% - 32px));
            transform: translateX(-50%) translateY(14px);
            opacity: 0;
            pointer-events: none;
            padding: 12px 18px;
            border-radius: var(--radius);
            background: #10201d;
            color: white;
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: var(--shadow);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.error { background: var(--danger); }
        #toast.warn { background: var(--warning); }

        @media (max-width: 860px) {
            .settings, .workbench { grid-template-columns: 1fr; }
            .actions { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 560px) {
            .shell { width: min(100% - 24px, 1080px); }
            header, .content { padding: 20px; }
            .actions { grid-template-columns: 1fr; }
            textarea { min-height: 190px; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <a class="nav" href="/">返回首页</a>
        <section class="panel">
            <header>
                <h1>对称加密工具</h1>
                <p>文本仅在当前浏览器中处理，不会上传到服务器。默认推荐使用 AES。</p>
            </header>

            <div class="content">
                <section class="settings" aria-label="加密设置">
                    <div class="field">
                        <label for="key">密钥</label>
                        <div class="key-row">
                            <input type="password" id="key" placeholder="输入加密或解密密钥" autocomplete="off" />
                            <button class="ghost-btn key-toggle" id="toggleKey" type="button">显示</button>
                        </div>
                        <p class="hint" id="keyHint">建议使用至少 12 个字符，并混合大小写、数字和符号。</p>
                    </div>

                    <div class="field">
                        <label for="algo">算法</label>
                        <select id="algo">
                            <option value="AES">AES（推荐）</option>
                            <option value="TripleDES">TripleDES</option>
                            <option value="DES">DES（兼容旧数据）</option>
                            <option value="Rabbit">Rabbit</option>
                            <option value="RC4">RC4（兼容旧数据）</option>
                        </select>
                    </div>

                    <button class="ghost-btn" id="swapButton" type="button">互换文本</button>
                </section>

                <section class="workbench" aria-label="加解密工作区">
                    <div class="box">
                        <div class="box-head">
                            <label for="plain">明文</label>
                            <button class="copy-btn" type="button" data-copy="plain">复制</button>
                        </div>
                        <textarea id="plain" placeholder="输入需要加密的文本。按 Ctrl + Enter 可快速加密。"></textarea>
                        <div class="stats"><span id="plainCount">0 字符</span><span>输入区</span></div>
                    </div>

                    <div class="actions">
                        <button class="btn encrypt" id="encryptButton" type="button">加密</button>
                        <button class="btn decrypt" id="decryptButton" type="button">解密</button>
                        <button class="btn clear" id="clearButton" type="button">清空</button>
                    </div>

                    <div class="box">
                        <div class="box-head">
                            <label for="cipher">密文</label>
                            <button class="copy-btn" type="button" data-copy="cipher">复制</button>
                        </div>
                        <textarea id="cipher" placeholder="这里显示加密结果，也可以粘贴密文后解密。"></textarea>
                        <div class="stats"><span id="cipherCount">0 字符</span><span>输出区</span></div>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>

    <script>
        const $ = id => document.getElementById(id);
        const keyEl = $("key");
        const algoEl = $("algo");
        const plainEl = $("plain");
        const cipherEl = $("cipher");
        const toastEl = $("toast");

        function showToast(message, type = "info") {
            toastEl.textContent = message;
            toastEl.className = `show ${type}`;
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => {
                toastEl.className = "";
            }, 2600);
        }

        function updateStats() {
            $("plainCount").textContent = `${plainEl.value.length} 字符`;
            $("cipherCount").textContent = `${cipherEl.value.length} 字符`;
            const score = [
                keyEl.value.length >= 12,
                /[A-Z]/.test(keyEl.value),
                /[a-z]/.test(keyEl.value),
                /\d/.test(keyEl.value),
                /[^A-Za-z0-9]/.test(keyEl.value)
            ].filter(Boolean).length;

            const hint = score >= 4 ? "密钥强度较好。" : score >= 2 ? "密钥强度一般，建议增加长度和字符类型。" : "建议使用至少 12 个字符，并混合大小写、数字和符号。";
            $("keyHint").textContent = hint;
        }

        function requireReady(target) {
            if (!window.CryptoJS) {
                showToast("CryptoJS 未加载，请检查网络后刷新页面。", "error");
                return false;
            }
            if (!keyEl.value.trim()) {
                showToast("请先输入密钥。", "warn");
                keyEl.focus();
                return false;
            }
            if (!target.value.trim()) {
                showToast("请先输入需要处理的文本。", "warn");
                target.focus();
                return false;
            }
            return true;
        }

        function processText(mode) {
            const algo = algoEl.value;
            try {
                if (mode === "encrypt") {
                    if (!requireReady(plainEl)) return;
                    cipherEl.value = CryptoJS[algo].encrypt(plainEl.value, keyEl.value).toString();
                    showToast(`已使用 ${algo} 加密。`);
                } else {
                    if (!requireReady(cipherEl)) return;
                    const decrypted = CryptoJS[algo].decrypt(cipherEl.value.trim(), keyEl.value).toString(CryptoJS.enc.Utf8);
                    if (!decrypted) throw new Error("empty result");
                    plainEl.value = decrypted;
                    showToast(`已使用 ${algo} 解密。`);
                }
                updateStats();
            } catch (error) {
                showToast("操作失败，请检查密钥、算法或密文格式。", "error");
            }
        }

        async function copyText(id) {
            const target = $(id);
            if (!target.value) {
                showToast("没有可复制的内容。", "warn");
                return;
            }

            try {
                await navigator.clipboard.writeText(target.value);
                showToast("已复制到剪贴板。");
            } catch (error) {
                target.select();
                document.execCommand("copy");
                showToast("已复制到剪贴板。");
            }
        }

        $("encryptButton").addEventListener("click", () => processText("encrypt"));
        $("decryptButton").addEventListener("click", () => processText("decrypt"));
        $("clearButton").addEventListener("click", () => {
            plainEl.value = "";
            cipherEl.value = "";
            updateStats();
            plainEl.focus();
            showToast("内容已清空。");
        });
        $("swapButton").addEventListener("click", () => {
            [plainEl.value, cipherEl.value] = [cipherEl.value, plainEl.value];
            updateStats();
            showToast("明文和密文已互换。");
        });
        $("toggleKey").addEventListener("click", () => {
            const isPassword = keyEl.type === "password";
            keyEl.type = isPassword ? "text" : "password";
            $("toggleKey").textContent = isPassword ? "隐藏" : "显示";
        });
        document.querySelectorAll("[data-copy]").forEach(button => {
            button.addEventListener("click", () => copyText(button.dataset.copy));
        });
        [plainEl, cipherEl, keyEl].forEach(el => el.addEventListener("input", updateStats));
        document.addEventListener("keydown", event => {
            if (event.ctrlKey && event.key === "Enter") {
                processText(document.activeElement === cipherEl ? "decrypt" : "encrypt");
            }
        });
        updateStats();
    </script>
</body>
</html>
