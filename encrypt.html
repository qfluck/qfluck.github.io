<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Symmetric Crypto Tool | 原生纯净版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.js"></script>
    
    <style>
        /* --- 1. 定义设计变量 --- */
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --success: #059669;
            --success-hover: #047857;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --border: #e2e8f0;
            --radius-xl: 1.5rem;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* --- 2. 基础布局 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
        }

        .main-container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        /* --- 3. 头部样式 --- */
        header {
            background: #0f172a;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.025em; }
        header p { color: #94a3b8; font-size: 0.9rem; margin-top: 8px; }

        /* --- 4. 表单与控制区 --- */
        .content-body { padding: 40px; }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.85rem; font-weight: 700; color: #475569; }

        input, select, textarea {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
        }

        /* --- 5. 操作区网格 --- */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .text-area-wrapper { display: flex; flex-direction: column; gap: 12px; }
        
        .area-header { display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { 
            font-size: 0.75rem; color: var(--primary); font-weight: 600; 
            cursor: pointer; background: none; border: none; 
        }

        textarea { resize: none; background: #f8fafc; }

        /* --- 6. 按钮样式 --- */
        .btn {
            padding: 14px;
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn:active { transform: scale(0.98); }
        .btn-encrypt { background: var(--primary); }
        .btn-encrypt:hover { background: var(--primary-hover); }
        .btn-decrypt { background: var(--success); }
        .btn-decrypt:hover { background: var(--success-hover); }

        /* --- 7. 消息弹窗 --- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: #1e293b;
            color: white;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        /* 响应式 */
        @media (max-width: 640px) {
            .content-body { padding: 25px; }
            header { padding: 30px 15px; }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <header>
            <h1>对称加密工具</h1>
            <p>私密、安全、纯本地运行的加解密方案</p>
        </header>

        <div class="content-body">
            <section class="settings-grid">
                <div class="input-group">
                    <label>加密/解密密钥</label>
                    <input type="password" id="key" placeholder="在此输入您的密钥...">
                </div>
                <div class="input-group">
                    <label>算法协议</label>
                    <select id="algo">
                        <option value="AES">AES (推荐)</option>
                        <option value="DES">DES</option>
                        <option value="TripleDES">TripleDES</option>
                        <option value="Rabbit">Rabbit</option>
                        <option value="RC4">RC4</option>
                    </select>
                </div>
            </section>

            <section class="tools-grid">
                <div class="text-area-wrapper">
                    <div class="area-header">
                        <label class="input-group label">原始明文</label>
                        <button class="copy-btn" onclick="copyText('plain')">复制内容</button>
                    </div>
                    <textarea id="plain" rows="7" placeholder="输入需要加密的文本..."></textarea>
                    <button class="btn btn-encrypt" onclick="process('encrypt')">加密文本 ↓</button>
                </div>

                <div class="text-area-wrapper">
                    <div class="area-header">
                        <label class="input-group label">结果密文</label>
                        <button class="copy-btn" onclick="copyText('cipher')">复制结果</button>
                    </div>
                    <textarea id="cipher" rows="7" placeholder="等待输出或粘贴密文..."></textarea>
                    <button class="btn btn-decrypt" onclick="process('decrypt')">解密文本 ↑</button>
                </div>
            </section>
        </div>
    </div>

    <div id="toast">提示消息</div>

<script>
    // --- 核心逻辑 ---
    function process(mode) {
        const key = document.getElementById('key').value.trim();
        const algo = document.getElementById('algo').value;
        const plainEl = document.getElementById('plain');
        const cipherEl = document.getElementById('cipher');

        if (!key) return showToast('请先输入密钥', 'error');

        try {
            if (mode === 'encrypt') {
                const text = plainEl.value.trim();
                if (!text) return showToast('请输入明文');
                const encrypted = CryptoJS[algo].encrypt(text, key).toString();
                cipherEl.value = encrypted;
                showToast(`使用 ${algo} 加密成功`);
            } else {
                const text = cipherEl.value.trim();
                if (!text) return showToast('请输入密文');
                const decrypted = CryptoJS[algo].decrypt(text, key).toString(CryptoJS.enc.Utf8);
                if (!decrypted) throw new Error();
                plainEl.value = decrypted;
                showToast(`使用 ${algo} 解密成功`);
            }
        } catch (e) {
            showToast('操作失败：请检查密钥或数据格式', 'error');
        }
    }

    // --- 辅助功能 ---
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function copyText(id) {
        const content = document.getElementById(id).value;
        if (!content) return showToast('内容为空');
        try {
            await navigator.clipboard.writeText(content);
            showToast('已复制到剪切板');
        } catch (err) {
            document.getElementById(id).select();
            document.execCommand('copy');
            showToast('已复制 (兼容模式)');
        }
    }
</script>
</body>
</html>
